<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MangaFlow - Fixed Admin</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, addDoc, updateDoc, arrayUnion, arrayRemove, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV1qDNjsBIbIBqQGBUhZSMpiIbzxLIpu0",
            authDomain: "manga-flow-686bd.firebaseapp.com",
            projectId: "manga-flow-686bd",
            storageBucket: "manga-flow-686bd.firebasestorage.app",
            messagingSenderId: "910769842045",
            appId: "1:910769842045:web:a31e06c20b8b38cc9e4e14"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.storage = getStorage(app);
        console.log("Firebase initialized");
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 20px; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 24px; margin-bottom: 12px; }
        .header h1 span { color: #e94560; }
        .nav { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .nav button, .auth-btn { background: transparent; border: none; color: #e0e0e0; font-size: 16px; padding: 8px 16px; cursor: pointer; border-radius: 8px; min-height: 44px; }
        .nav button.active { background: #e94560; color: white; }
        .auth-btn { background: #2a2a4a; margin-left: auto; }
        .search-container { padding: 16px 20px; background: #0f0f1a; }
        .search-container input { width: 100%; padding: 12px 16px; background: #1e1e2e; border: 1px solid #2a2a4a; border-radius: 12px; color: white; font-size: 16px; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .manga-card { background: #1a1a2a; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; transition: transform 0.2s; }
        .manga-card:hover { transform: translateY(-4px); }
        .favorite-icon { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 2; }
        .favorite-icon.favorited { color: #e94560; }
        .manga-cover { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #2a2a4a, #1a1a2e); display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; }
        .manga-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cover-error-fallback { position: absolute; font-size: 48px; }
        .manga-info { padding: 12px; }
        .manga-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .manga-author { font-size: 11px; color: #888; }
        .rating-stars { display: flex; gap: 3px; margin: 6px 0; font-size: 14px; cursor: pointer; }
        .rating-stars span { color: #ffc107; }
        .rating-count { font-size: 10px; color: #aaa; margin-left: 4px; }
        .reading-container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .chapter-nav, .page-controls { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        button { background: #e94560; border: none; color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; cursor: pointer; flex: 1; min-width: 100px; }
        button:disabled { background: #2a2a4a; cursor: not-allowed; }
        .manga-image { width: 100%; margin-bottom: 16px; border-radius: 8px; }
        .back-btn { background: transparent; color: #e94560; flex: 0; }
        .section { display: none; }
        .section.active { display: block; }
        .admin-panel { padding: 20px; max-width: 700px; margin: 0 auto; }
        .admin-section { background: #1a1a2a; border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        .admin-section h3 { margin-bottom: 16px; color: #e94560; }
        .admin-section input, .admin-section textarea, .admin-section select { width: 100%; padding: 12px; margin-bottom: 12px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; color: white; }
        .file-input-label { display: block; background: #2a2a4a; padding: 12px; text-align: center; border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
        .chapter-list { padding: 20px; }
        .chapter-item { background: #1a1a2a; padding: 16px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #e94560; color: white; padding: 12px; border-radius: 8px; text-align: center; z-index: 1000; display: none; }
        .auth-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: #1a1a2a; padding: 24px; border-radius: 24px; width: 90%; max-width: 350px; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 12px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; color: white; }
        .auth-card button { width: 100%; margin-top: 8px; }
        .refresh-btn { background: #2a2a4a; margin-top: 10px; }
        .status-text { font-size: 12px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Manga<span>Flow</span></h1>
    <div class="nav">
        <button class="nav-btn" data-section="home">🏠 Home</button>
        <button class="nav-btn" data-section="browse">📚 Browse</button>
        <button class="nav-btn" data-section="toprated">🏆 Top Rated</button>
        <button class="nav-btn" data-section="favorites">❤️ Favorites</button>
        <button class="nav-btn" data-section="history">🕓 History</button>
        <button class="nav-btn" data-section="admin">⚙️ Admin</button>
        <button id="authButton" class="auth-btn">Login</button>
    </div>
</div>

<div class="search-container" id="searchContainer">
    <input type="text" id="searchInput" placeholder="Search manga...">
</div>

<div id="homeSection" class="section">
    <div style="padding: 20px;"><h2>📢 Latest Uploads</h2></div>
    <div id="homeGrid" class="manga-grid"></div>
</div>
<div id="browseSection" class="section"><div id="browseGrid" class="manga-grid"></div></div>
<div id="topratedSection" class="section">
    <div style="padding: 20px;"><h2>🏆 Top Rated Manga</h2></div>
    <div id="topratedGrid" class="manga-grid"></div>
</div>
<div id="favoritesSection" class="section">
    <div style="padding: 20px;"><h2>❤️ Your Favorites</h2></div>
    <div id="favoritesGrid" class="manga-grid"></div>
</div>
<div id="historySection" class="section">
    <div style="padding: 20px;"><h2>🕓 Continue Reading</h2></div>
    <div id="historyList" class="chapter-list"></div>
</div>
<div id="readingSection" class="section">
    <button class="back-btn" id="backToHome">← Back</button>
    <div class="reading-container">
        <h2 id="readingTitle"></h2>
        <div class="chapter-nav">
            <button id="prevChapterBtn">← Previous Chapter</button>
            <button id="nextChapterBtn">Next Chapter →</button>
        </div>
        <div id="pagesContainer"></div>
        <div class="page-controls">
            <button id="prevPageBtn">◀ Previous Page</button>
            <button id="nextPageBtn">Next Page ▶</button>
        </div>
    </div>
</div>

<div id="adminSection" class="section">
    <div id="adminAuth" class="admin-panel"><input type="password" id="adminPassword" placeholder="Admin Password"><button id="adminLoginBtn">Login</button></div>
    <div id="adminContent" class="hidden">
        <div class="admin-panel">
            <div class="admin-section"><h3>📚 Add Manga</h3>
                <input type="text" id="adminTitle" placeholder="Title"><input type="text" id="adminAuthor" placeholder="Author">
                <textarea id="adminDesc" placeholder="Description"></textarea><input type="text" id="adminGenre" placeholder="Genre">
                <label class="file-input-label">📁 Cover Image (PNG, JPG)<input type="file" id="adminCover" accept="image/*" style="display:none;"></label>
                <div id="adminCoverPreview"></div>
                <div id="coverUploadStatus" class="status-text"></div>
                <button id="adminAddMangaBtn">Add Manga</button>
                <button id="refreshMangaListBtn" class="refresh-btn">⟳ Refresh Manga List</button>
            </div>
            <div class="admin-section"><h3>📄 Add Chapter (ZIP/CBZ)</h3>
                <select id="adminMangaSelect"></select>
                <input type="number" id="adminChapterNum" placeholder="Chapter #">
                <label class="file-input-label">📁 Upload Archive (ZIP/CBZ)<input type="file" id="adminChapterArchive" accept=".zip,.cbz" style="display:none;"></label>
                <div id="adminPagesPreview"></div>
                <div id="chapterUploadStatus" class="status-text"></div>
                <button id="adminAddChapterBtn">Upload & Add Chapter</button>
            </div>
            <div class="admin-section"><h3>🗑️ Delete Manga or Chapter</h3>
                <select id="deleteMangaSelect"></select>
                <select id="deleteChapterSelect" disabled><option>Select manga first</option></select>
                <button id="deleteSelectedBtn" style="background:#dc2626;">Delete Selected</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, addDoc, updateDoc, arrayUnion, arrayRemove, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const auth = getAuth();
    const db = getFirestore();
    const storage = getStorage();

    let currentUser = null;
    let currentManga = null;
    let currentChapter = null;
    let currentPageIndex = 0;
    let previousSection = 'home';
    let isAdmin = false;
    const ADMIN_PASSWORD = "R@y4n3_M4ng4";

    function showToast(msg) { 
        const toast = document.getElementById('toast'); 
        toast.textContent = msg; 
        toast.style.display = 'block'; 
        setTimeout(() => toast.style.display = 'none', 3000); 
        console.log("TOAST:", msg);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function getRatingStars(rating, size = 14) {
        const full = Math.floor(rating);
        let stars = '';
        for (let i = 0; i < full; i++) stars += '★';
        for (let i = stars.length; i < 5; i++) stars += '☆';
        return `<span style="font-size:${size}px; color:#ffc107;">${stars}</span>`;
    }

    async function submitRating(mangaId, ratingValue) {
        if (!currentUser) { showToast("Login to rate"); return false; }
        const mangaRef = doc(db, "manga", mangaId);
        const mangaSnap = await getDoc(mangaRef);
        if (!mangaSnap.exists()) return false;
        let ratings = mangaSnap.data().ratings || {};
        ratings[currentUser.uid] = ratingValue;
        await updateDoc(mangaRef, { ratings });
        showToast("Rating submitted!");
        return true;
    }

    async function getMangaWithRatings(mangaDocs) {
        const mangaList = [];
        for (const docSnap of mangaDocs) {
            const data = docSnap.data();
            const ratings = data.ratings || {};
            let sum = 0, count = 0;
            for (let uid in ratings) { sum += ratings[uid]; count++; }
            const avg = count > 0 ? sum / count : 0;
            mangaList.push({ id: docSnap.id, ...data, avgRating: avg, ratingCount: count, userRating: currentUser ? ratings[currentUser.uid] : null });
        }
        return mangaList;
    }

    async function renderMangaGrid(containerId, mangaList = null, showRating = true) {
        const container = document.getElementById(containerId);
        if (!mangaList) {
            console.log("Fetching manga from Firestore...");
            const q = query(collection(db, "manga"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            console.log(`Found ${snap.docs.length} manga documents`);
            mangaList = await getMangaWithRatings(snap.docs);
        }
        if (mangaList.length === 0) { container.innerHTML = '<div class="empty-state">No manga found.</div>'; return; }
        let favorites = [];
        if (currentUser) {
            const userSnap = await getDoc(doc(db, "users", currentUser.uid));
            favorites = userSnap.data()?.favorites || [];
        }
        container.innerHTML = mangaList.map(m => {
            const coverHtml = m.coverUrl ? `<img src="${m.coverUrl}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\"cover-error-fallback\">📖</span>'; console.log('Cover failed to load:', '${m.coverUrl}');">` : '<span>📖</span>';
            return `
            <div class="manga-card" data-id="${m.id}">
                <div class="favorite-icon ${favorites.includes(m.id) ? 'favorited' : ''}" data-id="${m.id}">❤️</div>
                <div class="manga-cover" onclick="window.viewManga('${m.id}')">
                    ${coverHtml}
                </div>
                <div class="manga-info" onclick="window.viewManga('${m.id}')">
                    <div class="manga-title">${escapeHtml(m.title)}</div>
                    <div class="manga-author">${escapeHtml(m.author)}</div>
                    ${showRating ? `<div class="rating-stars" data-id="${m.id}" data-rating="${m.avgRating}" data-user-rating="${m.userRating || ''}">${getRatingStars(m.avgRating, 12)} <span class="rating-count">(${m.ratingCount})</span></div>` : ''}
                    <div style="font-size:10px; color:#e94560;">${m.chapterCount || 0} chaps</div>
                </div>
            </div>`;
        }).join('');
        if (showRating) {
            document.querySelectorAll(`#${containerId} .rating-stars`).forEach(starDiv => {
                const mangaId = starDiv.dataset.id;
                starDiv.style.cursor = 'pointer';
                starDiv.onclick = async (e) => {
                    e.stopPropagation();
                    if (!currentUser) { showToast("Login to rate"); return; }
                    const newRating = prompt("Rate 1-5 stars:", starDiv.dataset.userRating || "5");
                    if (newRating && !isNaN(newRating) && newRating >= 1 && newRating <= 5) {
                        await submitRating(mangaId, parseFloat(newRating));
                        const activeSection = document.querySelector('.section.active').id;
                        if (activeSection === 'homeSection') renderMangaGrid('homeGrid');
                        else if (activeSection === 'browseSection') renderMangaGrid('browseGrid');
                        else if (activeSection === 'topratedSection') loadTopRated();
                        else if (activeSection === 'favoritesSection') loadFavorites();
                    } else if (newRating) showToast("Enter 1-5");
                };
            });
        }
        document.querySelectorAll(`#${containerId} .favorite-icon`).forEach(icon => {
            icon.onclick = (e) => { e.stopPropagation(); toggleFavorite(icon.dataset.id, icon); };
        });
    }

    async function toggleFavorite(mangaId, iconElem) {
        if (!currentUser) { showToast("Login to save favorites"); return; }
        const userRef = doc(db, "users", currentUser.uid);
        const userSnap = await getDoc(userRef);
        const favorites = userSnap.data()?.favorites || [];
        const isFav = favorites.includes(mangaId);
        if (isFav) { await updateDoc(userRef, { favorites: arrayRemove(mangaId) }); iconElem.classList.remove('favorited'); showToast("Removed"); }
        else { await updateDoc(userRef, { favorites: arrayUnion(mangaId) }); iconElem.classList.add('favorited'); showToast("Added"); }
        if (document.getElementById('favoritesSection').classList.contains('active')) loadFavorites();
    }

    async function loadFavorites() {
        if (!currentUser) { document.getElementById('favoritesGrid').innerHTML = '<div class="empty-state">Login to see favorites</div>'; return; }
        const userSnap = await getDoc(doc(db, "users", currentUser.uid));
        const favIds = userSnap.data()?.favorites || [];
        if (favIds.length === 0) { document.getElementById('favoritesGrid').innerHTML = '<div class="empty-state">No favorites yet</div>'; return; }
        const mangaList = [];
        for (let id of favIds) {
            const snap = await getDoc(doc(db, "manga", id));
            if (snap.exists()) {
                const data = snap.data();
                const ratings = data.ratings || {};
                let sum = 0, count = 0;
                for (let uid in ratings) { sum += ratings[uid]; count++; }
                const avg = count > 0 ? sum / count : 0;
                mangaList.push({ id, ...data, avgRating: avg, ratingCount: count, userRating: currentUser ? ratings[currentUser.uid] : null });
            }
        }
        renderMangaGrid('favoritesGrid', mangaList);
    }

    async function loadTopRated() {
        const q = query(collection(db, "manga"));
        const snap = await getDocs(q);
        let mangaList = await getMangaWithRatings(snap.docs);
        mangaList.sort((a,b) => b.avgRating - a.avgRating);
        mangaList = mangaList.slice(0, 20);
        renderMangaGrid('topratedGrid', mangaList);
    }

    async function loadHistory() {
        if (!currentUser) { document.getElementById('historyList').innerHTML = '<div class="empty-state">Login to see history</div>'; return; }
        const historyRef = collection(db, "users", currentUser.uid, "history");
        const q = query(historyRef, orderBy("lastRead", "desc"), limit(20));
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById('historyList').innerHTML = '<div class="empty-state">No reading history</div>'; return; }
        let html = '';
        for (const docSnap of snap.docs) {
            const data = docSnap.data();
            const mangaSnap = await getDoc(doc(db, "manga", data.mangaId));
            if (!mangaSnap.exists()) continue;
            const manga = mangaSnap.data();
            html += `<div class="chapter-item" onclick="window.resumeReading('${data.mangaId}', ${data.chapterNum}, ${data.pageIndex || 0})">
                        <span><strong>${escapeHtml(manga.title)}</strong> - Chapter ${data.chapterNum}</span>
                        <span>Continue →</span>
                    </div>`;
        }
        document.getElementById('historyList').innerHTML = html;
    }

    window.viewManga = async (mangaId) => {
        const mangaSnap = await getDoc(doc(db, "manga", mangaId));
        if (!mangaSnap.exists()) return;
        currentManga = { id: mangaId, ...mangaSnap.data() };
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('readingSection').classList.add('active');
        document.getElementById('searchContainer').style.display = 'none';
        document.getElementById('readingTitle').innerHTML = `${escapeHtml(currentManga.title)} <span style="font-size:14px;">by ${escapeHtml(currentManga.author)}</span>`;
        const chaptersSnap = await getDocs(collection(db, "manga", mangaId, "chapters"));
        const chapters = chaptersSnap.docs.map(d => ({ num: parseInt(d.id), ...d.data() })).sort((a,b) => a.num - b.num);
        if (chapters.length === 0) { document.getElementById('pagesContainer').innerHTML = '<div class="empty-state">No chapters yet</div>'; return; }
        let chaptersHtml = '<div class="chapter-list"><h3>📑 Chapters</h3>';
        for (const ch of chapters) {
            chaptersHtml += `<div class="chapter-item" onclick="window.openChapter('${mangaId}', ${ch.num})">
                                <span>Chapter ${ch.num} <span style="font-size:12px;">(${ch.pageCount} pages)</span></span>
                                <span>Read →</span>
                            </div>`;
        }
        chaptersHtml += '</div>';
        document.getElementById('pagesContainer').innerHTML = chaptersHtml;
        document.getElementById('prevChapterBtn').style.display = 'none';
        document.getElementById('nextChapterBtn').style.display = 'none';
    };

    window.openChapter = async (mangaId, chapterNum) => {
        const chapterRef = doc(db, "manga", mangaId, "chapters", chapterNum.toString());
        const chapterSnap = await getDoc(chapterRef);
        if (!chapterSnap.exists()) return;
        currentChapter = { num: chapterNum, ...chapterSnap.data() };
        currentPageIndex = 0;
        renderChapterContent();
        if (currentUser) {
            const historyRef = doc(db, "users", currentUser.uid, "history", `${mangaId}_${chapterNum}`);
            await setDoc(historyRef, { mangaId, chapterNum, pageIndex: 0, lastRead: new Date() }, { merge: true });
        }
    };

    window.resumeReading = async (mangaId, chapterNum, pageIndex) => {
        await window.viewManga(mangaId);
        setTimeout(() => window.openChapter(mangaId, chapterNum), 100);
        setTimeout(() => { currentPageIndex = pageIndex; renderChapterContent(); }, 200);
    };

    function renderChapterContent() {
        const container = document.getElementById('pagesContainer');
        const pages = currentChapter.pages;
        container.innerHTML = `<div style="text-align:center; margin-bottom:20px;"><h3>${escapeHtml(currentManga.title)} - Chapter ${currentChapter.num}</h3><div>Page ${currentPageIndex+1} of ${pages.length}</div></div><img class="manga-image" src="${pages[currentPageIndex]}" alt="page">`;
        document.getElementById('prevChapterBtn').style.display = 'flex';
        document.getElementById('nextChapterBtn').style.display = 'flex';
        document.getElementById('prevPageBtn').disabled = currentPageIndex === 0;
        document.getElementById('nextPageBtn').disabled = currentPageIndex === pages.length - 1;
        if (currentUser) {
            const historyRef = doc(db, "users", currentUser.uid, "history", `${currentManga.id}_${currentChapter.num}`);
            setDoc(historyRef, { pageIndex: currentPageIndex, lastRead: new Date() }, { merge: true });
        }
    }

    document.getElementById('prevPageBtn').onclick = () => { if (currentPageIndex > 0) { currentPageIndex--; renderChapterContent(); } };
    document.getElementById('nextPageBtn').onclick = () => { if (currentPageIndex < currentChapter.pages.length-1) { currentPageIndex++; renderChapterContent(); } };
    document.getElementById('backToHome').onclick = () => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(previousSection + 'Section').classList.add('active');
        document.getElementById('searchContainer').style.display = (previousSection === 'home' || previousSection === 'browse' || previousSection === 'toprated') ? 'block' : 'none';
    };

    function showAuthModal() {
        const modal = document.createElement('div');
        modal.className = 'auth-modal';
        modal.innerHTML = `<div class="auth-card"><h3>Login / Signup</h3><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><button id="authLoginBtn">Login</button><button id="authSignupBtn">Sign Up</button><button id="authCloseBtn">Cancel</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('authLoginBtn').onclick = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPassword').value); showToast("Logged in"); modal.remove(); } catch(e) { showToast(e.message); } };
        document.getElementById('authSignupBtn').onclick = async () => { try { await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPassword').value); showToast("Account created"); modal.remove(); } catch(e) { showToast(e.message); } };
        document.getElementById('authCloseBtn').onclick = () => modal.remove();
    }

    document.getElementById('authButton').onclick = () => currentUser ? signOut(auth) : showAuthModal();
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        document.getElementById('authButton').textContent = user ? 'Logout' : 'Login';
        if (user) { const userRef = doc(db, "users", user.uid); const snap = await getDoc(userRef); if (!snap.exists()) await setDoc(userRef, { favorites: [], email: user.email }); }
        if (document.getElementById('favoritesSection').classList.contains('active')) loadFavorites();
        if (document.getElementById('historySection').classList.contains('active')) loadHistory();
    });

    // Navigation - fixed: always show section, no isAdmin check
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const section = btn.dataset.section;
            console.log("Navigating to section:", section);
            // Update active button style
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Hide all sections
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // Show selected section
            const targetSection = document.getElementById(`${section}Section`);
            if (targetSection) {
                targetSection.classList.add('active');
                previousSection = section;
                // Show/hide search bar
                const searchContainer = document.getElementById('searchContainer');
                if (section === 'home' || section === 'browse' || section === 'toprated') {
                    searchContainer.style.display = 'block';
                } else {
                    searchContainer.style.display = 'none';
                }
                // Load data if needed
                if (section === 'home') renderMangaGrid('homeGrid');
                if (section === 'browse') renderMangaGrid('browseGrid');
                if (section === 'toprated') loadTopRated();
                if (section === 'favorites') loadFavorites();
                if (section === 'history') loadHistory();
                if (section === 'admin') {
                    // Just show the admin section; login state handled inside
                    console.log("Admin section opened");
                }
            } else {
                console.error("Section not found:", section);
            }
        });
    });
    
    // Set initial active section
    document.querySelector('.nav-btn[data-section="home"]').classList.add('active');
    document.getElementById('homeSection').classList.add('active');
    renderMangaGrid('homeGrid');
    renderMangaGrid('browseGrid');

    document.getElementById('searchInput').addEventListener('input', () => { 
        const term = document.getElementById('searchInput').value.toLowerCase(); 
        const cards = document.querySelectorAll('#browseGrid .manga-card'); 
        cards.forEach(card => { 
            const title = card.querySelector('.manga-title')?.innerText.toLowerCase(); 
            if (title) card.style.display = title.includes(term) ? 'block' : 'none'; 
        }); 
    });

    async function extractImagesFromArchive(file, previewElement) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext !== 'cbz' && ext !== 'zip') throw new Error('Only ZIP/CBZ files allowed');
        const zip = await JSZip.loadAsync(file);
        const imageFiles = Object.keys(zip.files).filter(f => /\.(jpg|jpeg|png|webp)$/i.test(f)).sort();
        if (imageFiles.length === 0) throw new Error('No images found in archive');
        const blobs = [];
        for (const f of imageFiles) {
            const blob = await zip.files[f].async('blob');
            blobs.push(blob);
        }
        previewElement.innerHTML = `✅ Extracted ${blobs.length} images.`;
        return blobs;
    }

    // Admin: cover upload
    let adminCoverData = null;
    document.getElementById('adminCover').onchange = async (e) => {
        const f = e.target.files[0];
        const statusDiv = document.getElementById('coverUploadStatus');
        if (!f) return;
        try {
            statusDiv.innerHTML = "Uploading cover...";
            const ext = f.name.split('.').pop().toLowerCase();
            if (!['jpg','jpeg','png','webp'].includes(ext)) throw new Error("Only JPG, PNG, WEBP allowed");
            const storagePath = `covers/${Date.now()}_${f.name}`;
            const storageRef = ref(storage, storagePath);
            await uploadBytes(storageRef, f);
            const url = await getDownloadURL(storageRef);
            adminCoverData = url;
            document.getElementById('adminCoverPreview').innerHTML = `<img src="${url}" style="max-height:100px;">`;
            statusDiv.innerHTML = "Cover uploaded ✅";
            console.log("Cover URL:", url);
        } catch(err) {
            statusDiv.innerHTML = "Upload failed: " + err.message;
            showToast(err.message);
            adminCoverData = null;
        }
    };

    document.getElementById('adminAddMangaBtn').onclick = async () => {
        if (!isAdmin) { showToast("Please login as admin first"); return; }
        const title = document.getElementById('adminTitle').value.trim();
        const author = document.getElementById('adminAuthor').value.trim();
        if (!title || !author) { showToast("Title & author required"); return; }
        try {
            const docRef = await addDoc(collection(db, "manga"), {
                title, author,
                description: document.getElementById('adminDesc').value,
                genre: document.getElementById('adminGenre').value,
                coverUrl: adminCoverData || null,
                createdAt: new Date(),
                chapterCount: 0,
                ratings: {}
            });
            showToast(`"${title}" added with ID ${docRef.id}`);
            console.log("Manga added:", docRef.id);
            // Clear form
            document.getElementById('adminTitle').value = '';
            document.getElementById('adminAuthor').value = '';
            document.getElementById('adminDesc').value = '';
            document.getElementById('adminGenre').value = '';
            document.getElementById('adminCoverPreview').innerHTML = '';
            document.getElementById('coverUploadStatus').innerHTML = '';
            adminCoverData = null;
            // Refresh
            await loadAdminSelects();
            await loadDeleteSelects();
            await renderMangaGrid('homeGrid');
            await renderMangaGrid('browseGrid');
        } catch(err) {
            showToast("Error adding manga: "+err.message);
            console.error(err);
        }
    };

    document.getElementById('refreshMangaListBtn').onclick = async () => {
        await loadAdminSelects();
        await loadDeleteSelects();
        showToast("Manga list refreshed");
    };

    // Chapter upload
    let adminArchiveFiles = null;
    document.getElementById('adminChapterArchive').onchange = async (e) => {
        const file = e.target.files[0];
        const previewDiv = document.getElementById('adminPagesPreview');
        const statusDiv = document.getElementById('chapterUploadStatus');
        if (!file) return;
        previewDiv.innerHTML = 'Extracting images...';
        statusDiv.innerHTML = '';
        try {
            adminArchiveFiles = await extractImagesFromArchive(file, previewDiv);
            previewDiv.innerHTML = `✅ Extracted ${adminArchiveFiles.length} images. Ready to upload.`;
            statusDiv.innerHTML = `Ready: ${adminArchiveFiles.length} pages`;
        } catch(err) {
            showToast(err.message);
            previewDiv.innerHTML = 'Extraction failed';
            statusDiv.innerHTML = err.message;
            adminArchiveFiles = null;
        }
    };

    document.getElementById('adminAddChapterBtn').onclick = async () => {
        if (!isAdmin) { showToast("Please login as admin first"); return; }
        const mangaId = document.getElementById('adminMangaSelect').value;
        const chapterNum = parseInt(document.getElementById('adminChapterNum').value);
        if (!mangaId || !chapterNum || !adminArchiveFiles || adminArchiveFiles.length === 0) {
            showToast("Select manga, chapter #, and upload a ZIP/CBZ file first");
            return;
        }
        const statusDiv = document.getElementById('chapterUploadStatus');
        statusDiv.innerHTML = "Uploading pages to Firebase Storage...";
        try {
            const pageUrls = [];
            for (let i=0; i<adminArchiveFiles.length; i++) {
                const file = adminArchiveFiles[i];
                const path = `pages/${mangaId}/${chapterNum}/page_${i+1}.jpg`;
                const storageRef = ref(storage, path);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                pageUrls.push(url);
                statusDiv.innerHTML = `Uploaded ${i+1}/${adminArchiveFiles.length} pages...`;
            }
            await setDoc(doc(db, "manga", mangaId, "chapters", chapterNum.toString()), {
                num: chapterNum,
                pages: pageUrls,
                pageCount: pageUrls.length
            });
            const mangaRef = doc(db, "manga", mangaId);
            const mangaSnap = await getDoc(mangaRef);
            await updateDoc(mangaRef, { chapterCount: (mangaSnap.data().chapterCount || 0) + 1 });
            showToast(`Chapter ${chapterNum} added with ${pageUrls.length} pages`);
            statusDiv.innerHTML = "Chapter added successfully!";
            document.getElementById('adminChapterNum').value = '';
            document.getElementById('adminPagesPreview').innerHTML = '';
            adminArchiveFiles = null;
            await loadAdminSelects();
            await loadDeleteSelects();
            await renderMangaGrid('homeGrid');
            await renderMangaGrid('browseGrid');
        } catch(err) {
            showToast("Error adding chapter: "+err.message);
            statusDiv.innerHTML = "Error: "+err.message;
            console.error(err);
        }
    };

    async function loadAdminSelects() {
        try {
            const snap = await getDocs(collection(db, "manga"));
            const select = document.getElementById('adminMangaSelect');
            if (snap.docs.length === 0) {
                select.innerHTML = '<option value="">No manga found. Add one first.</option>';
            } else {
                select.innerHTML = '<option value="">Select manga</option>' + snap.docs.map(d => `<option value="${d.id}">${escapeHtml(d.data().title)}</option>`).join('');
            }
        } catch(err) { console.error(err); showToast("Failed to load manga list"); }
    }

    async function loadDeleteSelects() {
        const snap = await getDocs(collection(db, "manga"));
        const mangaSelect = document.getElementById('deleteMangaSelect');
        mangaSelect.innerHTML = '<option value="">Select manga</option>' + snap.docs.map(d => `<option value="${d.id}">${escapeHtml(d.data().title)}</option>`).join('');
        mangaSelect.onchange = async () => {
            const mangaId = mangaSelect.value;
            const chapterSelect = document.getElementById('deleteChapterSelect');
            if (!mangaId) { chapterSelect.disabled = true; chapterSelect.innerHTML = '<option>Select manga first</option>'; return; }
            const chaptersSnap = await getDocs(collection(db, "manga", mangaId, "chapters"));
            const chapters = chaptersSnap.docs.map(d => ({ num: parseInt(d.id), ...d.data() })).sort((a,b) => a.num - b.num);
            chapterSelect.disabled = false;
            chapterSelect.innerHTML = '<option value="">-- Delete entire manga --</option>' + chapters.map(ch => `<option value="chapter_${ch.num}">Chapter ${ch.num} (${ch.pageCount} pages)</option>`).join('');
        };
    }

    document.getElementById('deleteSelectedBtn').onclick = async () => {
        if (!isAdmin) { showToast("Admin only"); return; }
        const mangaId = document.getElementById('deleteMangaSelect').value;
        const chapterValue = document.getElementById('deleteChapterSelect').value;
        if (!mangaId) { showToast("Select a manga"); return; }
        if (!confirm("Are you sure? This cannot be undone.")) return;
        if (chapterValue === "") {
            // Delete entire manga
            const chaptersSnap = await getDocs(collection(db, "manga", mangaId, "chapters"));
            for (const chapDoc of chaptersSnap.docs) {
                const pages = chapDoc.data().pages;
                for (const url of pages) {
                    try { await deleteObject(ref(storage, url)); } catch(e) {}
                }
                await deleteDoc(doc(db, "manga", mangaId, "chapters", chapDoc.id));
            }
            const mangaRef = doc(db, "manga", mangaId);
            const mangaData = (await getDoc(mangaRef)).data();
            if (mangaData.coverUrl) {
                try { await deleteObject(ref(storage, mangaData.coverUrl)); } catch(e) {}
            }
            await deleteDoc(mangaRef);
            showToast("Manga deleted");
        } else {
            const chapterNum = parseInt(chapterValue.split('_')[1]);
            const chapterRef = doc(db, "manga", mangaId, "chapters", chapterNum.toString());
            const chapterSnap = await getDoc(chapterRef);
            if (chapterSnap.exists()) {
                const pages = chapterSnap.data().pages;
                for (const url of pages) {
                    try { await deleteObject(ref(storage, url)); } catch(e) {}
                }
                await deleteDoc(chapterRef);
                const mangaRef = doc(db, "manga", mangaId);
                const mangaSnap = await getDoc(mangaRef);
                await updateDoc(mangaRef, { chapterCount: (mangaSnap.data().chapterCount || 0) - 1 });
                showToast(`Chapter ${chapterNum} deleted`);
            }
        }
        await loadDeleteSelects();
        await loadAdminSelects();
        await renderMangaGrid('homeGrid');
        await renderMangaGrid('browseGrid');
        await loadTopRated();
        if (currentUser) await loadFavorites();
    };

    async function uploadFile(file, path) {
        const storageRef = ref(storage, path);
        await uploadBytes(storageRef, file);
        return await getDownloadURL(storageRef);
    }

    // Admin login
    document.getElementById('adminLoginBtn').onclick = () => {
        const pwd = document.getElementById('adminPassword').value;
        if (pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('adminAuth').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            loadAdminSelects();
            loadDeleteSelects();
            showToast("Admin logged in");
        } else {
            showToast("Wrong password");
        }
    };
</script>
</body>
</html>
